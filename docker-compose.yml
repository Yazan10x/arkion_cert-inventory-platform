services:
  postgres:
    image: postgres:16-alpine
    container_name: cert_inventory_postgres
    environment:
      POSTGRES_DB: cert_inventory
      POSTGRES_USER: cert_user
      POSTGRES_PASSWORD: cert_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cert_user -d cert_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: backend
    environment:
      DATABASE_URL: postgres://cert_user:cert_password@postgres:5432/cert_inventory
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    environment:
      API_BASE_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: